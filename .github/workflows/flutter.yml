name: Build APK

on:
push:
branches: ["main"]

jobs:
build:
runs-on: ubuntu-latest

steps:
  - uses: actions/checkout@v4

  # ✅ Unzip project into mobile folder
  - name: Unzip project
    run: unzip mobile.zip -d mobile

  - name: Setup Flutter
    uses: subosito/flutter-action@v2
    with:
      flutter-version: '3.22.0'

  # 🔥 Fix Android (inside mobile folder)
  - name: Fix Android embedding safely
    working-directory: mobile
    run: |
      rm -rf android
      flutter create . --project-name mobile_app --platforms=android

  # ✅ Restore your app code
  - name: Restore your app code
    working-directory: mobile
    run: unzip -o ../mobile.zip

  - name: Install dependencies
    working-directory: mobile
    run: flutter pub get

  - name: Build APK
    working-directory: mobile
    run: flutter build apk --release

  - uses: actions/upload-artifact@v4
    with:
      name: mdtelecom-release-apk
      path: mobile/build/app/outputs/flutter-apk/app-release.apk
