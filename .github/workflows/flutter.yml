name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Unzip project
        run: unzip mobile.zip

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      # 🔥 Fix ONLY Android (safe)
      - name: Fix Android embedding safely
        run: |
          rm -rf android
          flutter create . --project-name mobile_app --platforms=android

      # ✅ FIXED (correct unzip syntax)
      - name: Restore your app code
        run: unzip -o mobile.zip

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
